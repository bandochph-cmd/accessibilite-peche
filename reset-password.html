<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ouverture de l’application</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5fbfd;
      color: #123;
    }

    .card {
      width: min(92vw, 420px);
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .button {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 8px;
      background: #118ab2;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }

    .small {
      margin-top: 14px;
      font-size: 13px;
      color: #667;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Ouverture de l’application...</h1>
    <p>Vous allez être redirigé vers Accessibilité Pêche.</p>

    <a id="open-app" class="button" href="#">
      Ouvrir l’application
    </a>

    <p class="small">
      Si rien ne se passe, appuyez sur le bouton ci-dessus.
    </p>
  </main>

  <script>
    // 🟩============================================================
    // 🟩 RELAIS SUPABASE -> APPLICATION ANDROID
    // 🟩============================================================
    // 🟢 Objectif :
    // 🟢 - conserver les paramètres renvoyés par Supabase
    // 🟢 - éviter l'appel direct spotsaccessibles:// depuis le navigateur
    // 🟢 - utiliser intent:// sur Android pour limiter les pages d'erreur WebView
    // 🟢 - garder un bouton manuel si l'ouverture automatique est bloquée

    const androidPackage = 'fr.accesspeche.app'; // 🟢 modifiable uniquement si applicationId change

    function buildAuthParams() {
      // 🟢 Supabase peut revenir avec des paramètres en query :
      // 🟢 ?code=...
      const params = new URLSearchParams(window.location.search);

      // 🟢 Et parfois avec des paramètres en hash :
      // 🟢 #access_token=...&refresh_token=...&type=recovery
      const rawHash = window.location.hash.startsWith('#')
        ? window.location.hash.substring(1)
        : '';

      if (rawHash.length > 0) {
        const hashParams = new URLSearchParams(rawHash);

        hashParams.forEach((value, key) => {
          if (!params.has(key)) {
            params.set(key, value);
          }
        });
      }

      const query = params.toString();
      return query.length > 0 ? `?${query}` : '';
    }

    const authParams = buildAuthParams();

    // 🟢 URL custom scheme conservée en secours.
    const customSchemeUrl =
      `spotsaccessibles://reset-password${authParams}`;

    // 🟢 URL Android Intent : ouvre explicitement le package Android.
    const androidIntentUrl =
      `intent://reset-password${authParams}` +
      `#Intent;scheme=spotsaccessibles;package=${androidPackage};` +
      `S.browser_fallback_url=${encodeURIComponent(window.location.href)};end`;

    const isAndroid = /Android/i.test(navigator.userAgent);

    const targetUrl = isAndroid ? androidIntentUrl : customSchemeUrl;

    const button = document.getElementById('open-app');
    button.setAttribute('href', targetUrl);

    // 🟢 Ouverture automatique après un court délai pour laisser la page s'afficher.
    // 🟢 Si le navigateur bloque l'ouverture automatique, le bouton reste disponible.
    window.setTimeout(() => {
      window.location.href = targetUrl;
    }, 250); // 🟢 modifiable : délai avant tentative d'ouverture
  </script>
</body>
</html>
