<!-- 🟩 FICHIER : reset-password.html -->
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ouverture de l’application</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5fbfd;
      color: #123;
    }

    .card {
      width: min(92vw, 420px);
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .button {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 8px;
      background: #118ab2;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }

    .small {
      margin-top: 14px;
      font-size: 13px;
      color: #667;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Ouverture sécurisée</h1>

    <p>
      Votre lien est prêt.
      Appuyez sur le bouton ci-dessous pour ouvrir Accessibilité Pêche.
    </p>

    <a id="open-app" class="button" href="#">
      Ouvrir l’application
    </a>

    <p class="small">
      Cette étape permet d’éviter les erreurs d’ouverture dans certains navigateurs de messagerie.
    </p>
  </main>

  <script>
    // 🟩============================================================
    // 🟩 RELAIS SUPABASE -> APPLICATION ANDROID
    // 🟩============================================================
    // 🟢 IMPORTANT :
    // 🟢 On ne redirige plus automatiquement.
    // 🟢 Le clic utilisateur évite le flash d'erreur des WebView Outlook/Gmail.
    // 🟢 Les paramètres Supabase sont conservés pour que l'app reçoive le recovery.

    const androidPackage = 'fr.accesspeche.app'; // 🟢 modifiable uniquement si applicationId change

    function buildAuthParams() {
      // 🟢 Supabase revient généralement avec ?code=...
      const params = new URLSearchParams(window.location.search);

      // 🟢 Sécurité : si Supabase revient avec un hash, on le récupère aussi.
      const rawHash = window.location.hash.startsWith('#')
        ? window.location.hash.substring(1)
        : '';

      if (rawHash.length > 0) {
        const hashParams = new URLSearchParams(rawHash);

        hashParams.forEach((value, key) => {
          if (!params.has(key)) {
            params.set(key, value);
          }
        });
      }

      const query = params.toString();
      return query.length > 0 ? `?${query}` : '';
    }

    const authParams = buildAuthParams();

    // 🟢 Lien de secours classique.
    const customSchemeUrl =
      `spotsaccessibles://reset-password${authParams}`;

    // 🟢 Lien Android propre avec package exact.
    const androidIntentUrl =
      `intent://reset-password${authParams}` +
      `#Intent;scheme=spotsaccessibles;package=${androidPackage};` +
      `S.browser_fallback_url=${encodeURIComponent(window.location.href)};end`;

    const isAndroid = /Android/i.test(navigator.userAgent);

    const targetUrl = isAndroid ? androidIntentUrl : customSchemeUrl;

    const button = document.getElementById('open-app');
    button.setAttribute('href', targetUrl);

    // 🟢 Pas de window.location automatique ici.
    // 🟢 L'ouverture se fait uniquement au clic utilisateur.
  </script>
</body>
</html>
