<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ouverture de l’application</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: #f5fbfd;
      color: #123;
    }

    .card {
      width: min(92vw, 420px);
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
    }

    .button {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      border-radius: 8px;
      background: #118ab2;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }

    .small {
      margin-top: 14px;
      font-size: 13px;
      color: #667;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Ouverture de l’application...</h1>
    <p>Vous allez être redirigé vers Accessibilité Pêche.</p>

    <a id="open-app" class="button" href="spotsaccessibles://reset-password">
      Ouvrir l’application
    </a>

    <p class="small">
      Si rien ne se passe, appuyez sur le bouton ci-dessus.
    </p>
  </main>

  <script>
    // 🟩 Relais Supabase -> application mobile
    // 🟢 On conserve query + hash pour ne pas perdre les paramètres Auth.
    const target =
      'spotsaccessibles://reset-password' +
      window.location.search +
      window.location.hash;

    const button = document.getElementById('open-app');
    button.setAttribute('href', target);

    // 🟢 Ouverture automatique après un court délai pour laisser la page s’afficher.
    window.setTimeout(() => {
      window.location.href = target;
    }, 250);
  </script>
</body>
</html>
