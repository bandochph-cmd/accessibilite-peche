<!-- 🟩 FICHIER : reset-password.html -->
<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nouveau mot de passe — Accessibilité Pêche</title>

  <style>
    :root {
      --primary: #118ab2;
      --primary-dark: #0b6f91;
      --bg: #f5fbfd;
      --text: #123;
      --muted: #667;
      --danger: #b42318;
      --success: #067647;
      --border: #d7e3ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(94vw, 460px);
      padding: 26px;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.2;
      color: var(--text);
      text-align: center;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      text-align: center;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(17, 138, 178, 0.16);
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 18px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #ffffff;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-dark);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
      display: none;
    }

    .message.error {
      display: block;
      color: var(--danger);
      background: #fff1f0;
      border: 1px solid #ffd0cc;
    }

    .message.success {
      display: block;
      color: var(--success);
      background: #ecfdf3;
      border: 1px solid #abefc6;
    }

    .small {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>Nouveau mot de passe</h1>

    <p class="subtitle">
      Choisis un nouveau mot de passe pour ton compte Accessibilité Pêche.
    </p>

    <form id="reset-form" class="hidden">
      <label for="password">Nouveau mot de passe</label>
      <input
        id="password"
        type="password"
        autocomplete="new-password"
        minlength="8"
        required
      >

      <label for="password-confirm">Confirmer le mot de passe</label>
      <input
        id="password-confirm"
        type="password"
        autocomplete="new-password"
        minlength="8"
        required
      >

      <button id="submit-button" type="submit">
        Modifier mon mot de passe
      </button>
    </form>

    <div id="message" class="message"></div>

    <p class="small">
      Après validation, retourne dans l’application et connecte-toi avec ton nouveau mot de passe.
    </p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 🟩============================================================
    // 🟩 CONFIG SUPABASE
    // 🟩============================================================
    // 🟢 Clé anon publique : OK côté navigateur.
    // 🟢 Ne jamais mettre de service_role ici.
    const SUPABASE_URL = "https://zentyfamwemsyeqcbwle.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InplbnR5ZmFtd2Vtc3llcWNid2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk3NTAzNDYsImV4cCI6MjA3NTMyNjM0Nn0.I0SA-yh-PApsRx5RbGHXIpleyKDJ0DJIoe6lfygFi2Q";

    const client = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const form = document.getElementById("reset-form");
    const message = document.getElementById("message");
    const submitButton = document.getElementById("submit-button");

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "message " + type;
    }

    function getParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    async function initialiseRecoverySession() {
      // 🟩==========================================================
      // 🟩 TOKEN HASH SUPABASE
      // 🟩==========================================================
      // 🟢 Le template e-mail doit envoyer :
      // 🟢 ?token_hash={ .TokenHash }&type=recovery
      const tokenHash = getParam("token_hash");
      const type = getParam("type") || "recovery";

      if (!tokenHash || type !== "recovery") {
        showMessage(
          "Lien de réinitialisation invalide ou incomplet. Demande un nouveau lien depuis l’application.",
          "error"
        );
        return;
      }

      const { data, error } = await client.auth.verifyOtp({
        token_hash: tokenHash,
        type: "recovery"
      });

      if (error) {
        showMessage(
          "Ce lien est expiré ou déjà utilisé. Demande un nouveau lien de réinitialisation.",
          "error"
        );
        return;
      }

      form.classList.remove("hidden");
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const password = document.getElementById("password").value.trim();
      const confirm = document.getElementById("password-confirm").value.trim();

      if (password.length < 8) {
        showMessage(
          "Le mot de passe doit contenir au moins 8 caractères.",
          "error"
        );
        return;
      }

      if (password !== confirm) {
        showMessage(
          "Les deux mots de passe ne correspondent pas.",
          "error"
        );
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Modification en cours...";

      const { error } = await client.auth.updateUser({
        password: password
      });

      if (error) {
        submitButton.disabled = false;
        submitButton.textContent = "Modifier mon mot de passe";

        showMessage(
          "Impossible de modifier le mot de passe. Demande un nouveau lien et réessaie.",
          "error"
        );
        return;
      }

      await client.auth.signOut();

      form.classList.add("hidden");

      showMessage(
        "Mot de passe modifié avec succès. Tu peux retourner dans l’application et te connecter.",
        "success"
      );
    });

    initialiseRecoverySession();
  </script>
</body>
</html>
